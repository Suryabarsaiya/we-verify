# render.yaml — Infrastructure as Code for Render
# Render auto-detects this file and configures the service.
services:
  - type: web
    name: we-verify-api
    runtime: node
    region: oregon
    plan: free
    buildCommand: npm install
    startCommand: node server/index.js
    envVars:
      - key: NVIDIA_API_KEY
        sync: false
      - key: NVIDIA_MODEL
        value: meta/llama-3.1-8b-instruct
      - key: TAVILY_API_KEY
        sync: false
      - key: SUPABASE_URL
        value: https://ueykaaxhwtejyvromgfj.supabase.co
      - key: SUPABASE_KEY
        sync: false
      - key: PORT
        value: 3001
      - key: NODE_ENV
        value: production
